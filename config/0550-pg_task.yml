# 0550 pg_task
#==============================================================#
pg_task_19:
  name: pg_task
  desc: PostgreSQL progress task summary 19+
  query: |-
    WITH task(task) AS (
      VALUES ('vacuuming'), ('indexing'), ('clustering'), ('backup'), ('analyzing'), ('repacking'), ('checksumming')
    ), task_rows AS (
      SELECT 'vacuuming' AS task, pid,
        CASE phase
          WHEN 'scanning heap' THEN (CASE WHEN heap_blks_total > 0 THEN 1.0 * heap_blks_scanned / heap_blks_total ELSE NULL END)
          WHEN 'vacuuming indexes' THEN (CASE WHEN indexes_total > 0 THEN 1.0 * indexes_processed / indexes_total ELSE NULL END)
          WHEN 'vacuuming heap' THEN (CASE WHEN heap_blks_total > 0 THEN 1.0 * heap_blks_vacuumed / heap_blks_total ELSE NULL END)
          WHEN 'cleaning up indexes' THEN (CASE WHEN indexes_total > 0 THEN 1.0 * indexes_processed / indexes_total ELSE NULL END)
          ELSE NULL
        END AS progress
      FROM pg_stat_progress_vacuum
      UNION ALL
      SELECT 'indexing' AS task, pid,
        COALESCE(
          CASE WHEN blocks_total > 0 THEN 1.0 * blocks_done / blocks_total ELSE NULL END,
          CASE WHEN tuples_total > 0 THEN 1.0 * tuples_done / tuples_total ELSE NULL END,
          CASE WHEN partitions_total > 0 THEN 1.0 * partitions_done / partitions_total ELSE NULL END,
          CASE WHEN lockers_total > 0 THEN 1.0 * lockers_done / lockers_total ELSE NULL END
        ) AS progress
      FROM pg_stat_progress_create_index
      UNION ALL
      SELECT 'clustering' AS task, pid,
        CASE WHEN heap_blks_total > 0 THEN 1.0 * heap_blks_scanned / heap_blks_total ELSE NULL END AS progress
      FROM pg_stat_progress_cluster
      UNION ALL
      SELECT 'backup' AS task, pid,
        CASE WHEN param2 > 0 THEN 1.0 * param3 / param2 ELSE NULL END AS progress
      FROM pg_stat_get_progress_info('BASEBACKUP')
      UNION ALL
      SELECT 'analyzing' AS task, pid,
        CASE phase
          WHEN 'acquiring sample rows' THEN (CASE WHEN sample_blks_total > 0 THEN 1.0 * sample_blks_scanned / sample_blks_total ELSE NULL END)
          WHEN 'acquiring inherited sample rows' THEN (CASE WHEN child_tables_total > 0 THEN 1.0 * child_tables_done / child_tables_total ELSE NULL END)
          WHEN 'computing extended statistics' THEN (CASE WHEN ext_stats_total > 0 THEN 1.0 * ext_stats_computed / ext_stats_total ELSE NULL END)
          ELSE NULL
        END AS progress
      FROM pg_stat_progress_analyze
      UNION ALL
      SELECT 'repacking' AS task, pid,
        CASE WHEN heap_blks_total > 0 THEN 1.0 * heap_blks_scanned / heap_blks_total ELSE NULL END AS progress
      FROM pg_stat_progress_repack
      UNION ALL
      SELECT 'checksumming' AS task, pid,
        CASE
          WHEN datid = 0 AND databases_total > 0 THEN 1.0 * databases_done / databases_total
          WHEN relations_total > 0 THEN (relations_done + CASE WHEN blocks_total > 0 THEN least(1.0 * blocks_done / blocks_total, 1.0) ELSE 0 END) / relations_total
          WHEN blocks_total > 0 THEN 1.0 * blocks_done / blocks_total
          ELSE NULL
        END AS progress
      FROM pg_stat_progress_data_checksums
    ), summary AS (
      SELECT task, count(*) AS count, min(a.query_start) AS start_time, avg(progress) AS progress
      FROM task_rows LEFT JOIN pg_stat_activity a USING (pid) GROUP BY task
    )
    SELECT task.task, COALESCE(summary.count, 0) AS count,
      extract(EPOCH FROM summary.start_time) AS start_time,
      extract(EPOCH FROM now() - summary.start_time) AS duration,
      summary.progress
    FROM task LEFT JOIN summary USING (task);
  ttl: 10
  min_version: 190000
  tags: [ cluster ]
  metrics:
    - task:       { usage: LABEL ,description: "progress task type" }
    - count:      { usage: GAUGE ,description: "number of active rows in the progress view for this task" }
    - start_time: { usage: GAUGE ,description: "Unix epoch seconds of the oldest active task query start time" }
    - duration:   { usage: GAUGE ,description: "seconds since the oldest active task query start time" }
    - progress:   { usage: GAUGE ,description: "average best-effort progress ratio (0-1) for active rows in this task" }
